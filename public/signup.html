<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — SkillVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --bg-primary: #0b0c10;
      --bg-secondary: #15171e;
      --bg-card: #1a1c24;
      --text-primary: #f0f2f8;
      --text-secondary: #a4a8b8;
      --text-muted: #6b6f82;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-glow: rgba(99,102,241,0.22);
      --border: #2a2d3a;
      --rose: #f43f5e;
      --radius-md: 12px;
      --radius-xl: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }

    .nav {
      background: rgba(11,12,16,0.88); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .nav-inner { max-width: 1280px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10; text-decoration: none; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex; align-items: center; justify-content: center; color: #fff;
      box-shadow: 0 2px 8px var(--accent-glow); flex-shrink: 0;
    }
    .logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); margin-left: 10px; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link { font-size: 14px; color: var(--text-secondary); text-decoration: none; font-weight: 500; }
    .nav-link:hover { color: var(--text-primary); }
    .nav-btn { padding: 8px 18px; border-radius: 10px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; text-decoration: none; }

    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl);
      padding: 40px 32px; width: 100%; max-width: 440px; text-align: center;
    }
    .card-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .card-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 40px 0; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-muted); }

    .error-wrap { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 20px; }
    .error-text { font-size: 14px; color: var(--rose); }
    .retry-btn { padding: 8px 18px; border-radius: 8px; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; border: none; cursor: pointer; }

    .signin-prompt { font-size: 14px; color: var(--text-secondary); margin-top: 16px; }
    .signin-prompt a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .footer { border-top: 1px solid var(--border); padding: 20px 24px; }
    .footer-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12; }
    .footer-left { font-size: 13px; color: var(--text-muted); }
    .footer-links { display: flex; gap: 20px; }
    .footer-link { font-size: 13px; color: var(--text-muted); text-decoration: none; }

    @media (max-width: 640px) { .nav-links { display: none; } .footer-inner { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </div>
        <span class="logo-text">SkillVault</span>
      </a>
      <div class="nav-links" id="nav-auth">
        <a href="/login.html" class="nav-link">Login</a>
        <a href="/signup.html" class="nav-btn">Sign Up</a>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="card">
      <h1 class="card-title">Create Account</h1>
      <p class="card-sub">Start building with AI-powered skills</p>
      <div id="clerk-signup" class="signup-container"></div>
      <div class="loading-wrap" id="loading">
        <div class="spinner"></div>
        <span class="loading-text">Loading authentication...</span>
      </div>
      <div class="error-wrap" id="error-wrap">
        <span class="error-text" id="error-text">Failed to load authentication.</span>
        <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
      </div>
      <p class="signin-prompt">Already have an account? <a href="/login.html">Sign in</a></p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span style="font-weight:600;color:var(--text-primary)">SkillVault</span>
        <span style="color:var(--text-muted);margin-left:8px">· AI-Powered Skills</span>
      </div>
      <div class="footer-links">
        <a href="pricing.html" class="footer-link">Pricing</a>
        <a href="#coming-soon" class="footer-link">Docs</a>
        <a href="#coming-soon" class="footer-link">Support</a>
      </div>
    </div>
  </footer>

  <!-- Load Clerk script WITHOUT auto-initialization -->
  <script src="https://maximum-mammal-37.clerk.accounts.dev/npm/@clerk/clerk-js@4.73.14/dist/clerk.browser.js" crossorigin="anonymous"></script>
  <script src="auth-nav.js"></script>

  <script>
    (function() {
      const PUBLISHABLE_KEY = 'pk_test_bWF4aW11bS1tYW1tYWwtMzcuY2xlcmsuYWNjb3VudHMuZGV2JA';
      const params = new URLSearchParams(window.location.search);
      const returnUrl = params.get('return_url') || '/';
      const loadingEl = document.getElementById('loading');
      const errorWrap = document.getElementById('error-wrap');
      const errorText = document.getElementById('error-text');

      function showError(msg) {
        if (loadingEl) loadingEl.style.display = 'none';
        if (errorWrap) { errorWrap.style.display = 'flex'; errorText.textContent = msg || 'Failed to load authentication.'; }
      }

      function mountSignUp() {
        if (loadingEl) loadingEl.style.display = 'none';
        if (!window.Clerk) { showError('Clerk library not available.'); return; }
        const el = document.getElementById('clerk-signup');
        if (el && window.Clerk.mountSignUp) {
          window.Clerk.mountSignUp(el, { redirectUrl: returnUrl, afterSignUpUrl: returnUrl });
        } else {
          showError('Sign-up component not available.');
        }
      }

      async function initClerk() {
        try {
          if (!window.Clerk) {
            showError('Clerk failed to load. Please check your connection.');
            return;
          }
          await window.Clerk.load({ publishableKey: PUBLISHABLE_KEY });
          mountSignUp();
        } catch (err) {
          console.error('Clerk initialization error:', err);
          showError('Authentication failed: ' + (err.message || 'Unknown error'));
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initClerk);
      } else {
        initClerk();
      }
    })();
  </script>

</body>
</html>
