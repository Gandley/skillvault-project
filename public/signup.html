<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — SkillVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --bg-primary: #0b0c10;
      --bg-secondary: #15171e;
      --bg-card: #1a1c24;
      --text-primary: #f0f2f8;
      --text-secondary: #a4a8b8;
      --text-muted: #6b6f82;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-glow: rgba(99,102,241,0.22);
      --border: #2a2d3a;
      --rose: #f43f5e;
      --green: #34d399;
      --radius-md: 12px;
      --radius-xl: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }

    .nav {
      background: rgba(11,12,16,0.88); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .nav-inner { max-width: 1280px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10; text-decoration: none; }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex; align-items: center; justify-content: center; color: #fff;
      box-shadow: 0 2px 8px var(--accent-glow); flex-shrink: 0;
    }
    .logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); margin-left: 10px; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-link { font-size: 14px; color: var(--text-secondary); text-decoration: none; font-weight: 500; }
    .nav-link:hover { color: var(--text-primary); }
    .nav-btn { padding: 8px 18px; border-radius: 10px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; text-decoration: none; }

    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl);
      padding: 40px 32px; width: 100%; max-width: 440px; text-align: center;
    }
    .card-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .card-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

    .form-group { text-align: left; margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 12px 14px; border-radius: var(--radius-md);
      border: 1px solid var(--border); background: var(--bg-secondary);
      color: var(--text-primary); font-size: 14px; font-family: var(--font-body);
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }

    .submit-btn {
      width: 100%; padding: 12px; border-radius: var(--radius-md); border: none;
      background: var(--accent); color: #fff; font-size: 15px; font-weight: 700;
      font-family: var(--font-body); cursor: pointer; transition: opacity 0.2s;
      margin-top: 8px;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 40px 0; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-muted); }

    .error-msg { font-size: 13px; color: var(--rose); background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; display: none; text-align: left; }
    .success-msg { font-size: 13px; color: var(--green); background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; display: none; text-align: left; }

    .signin-prompt { font-size: 14px; color: var(--text-secondary); margin-top: 20px; }
    .signin-prompt a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .step2-info { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; text-align: left; line-height: 1.5; }

    .footer { border-top: 1px solid var(--border); padding: 20px 24px; }
    .footer-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12; }
    .footer-left { font-size: 13px; color: var(--text-muted); }
    .footer-links { display: flex; gap: 20px; }
    .footer-link { font-size: 13px; color: var(--text-muted); text-decoration: none; }

    @media (max-width: 640px) { .nav-links { display: none; } .footer-inner { flex-direction: column; text-align: center; } }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </div>
        <span class="logo-text">SkillVault</span>
      </a>
      <div class="nav-links" id="nav-auth">
        <a href="/login.html" class="nav-link">Login</a>
        <a href="/signup.html" class="nav-btn">Sign Up</a>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="card">
      <h1 class="card-title">Create Account</h1>
      <p class="card-sub">Start building with AI-powered skills</p>

      <!-- Loading state -->
      <div class="loading-wrap" id="loading">
        <div class="spinner"></div>
        <span class="loading-text">Loading authentication...</span>
      </div>

      <!-- Error / success messages -->
      <div class="error-msg" id="error-msg"></div>
      <div class="success-msg" id="success-msg"></div>

      <!-- Step 1: Email + Password -->
      <form id="signup-form" style="display:none;">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Min 8 characters" required minlength="8">
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Create Account</button>
      </form>

      <!-- Step 2: Verification Code -->
      <form id="verify-form" style="display:none;">
        <div class="step2-info">
          <strong>Check your email.</strong> We sent a verification code to <span id="verify-email" style="color:var(--text-primary);"></span>. Enter it below to complete your account.
        </div>
        <div class="form-group">
          <label class="form-label">Verification Code</label>
          <input type="text" id="verify-code" class="form-input" placeholder="123456" required maxlength="6" inputmode="numeric">
        </div>
        <button type="submit" class="submit-btn" id="verify-btn">Verify & Continue</button>
      </form>

      <p class="signin-prompt">Already have an account? <a href="/login.html">Sign in</a></p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span style="font-weight:600;color:var(--text-primary)">SkillVault</span>
        <span style="color:var(--text-muted);margin-left:8px">· AI-Powered Skills</span>
      </div>
      <div class="footer-links">
        <a href="pricing.html" class="footer-link">Pricing</a>
        <a href="#coming-soon" class="footer-link">Docs</a>
        <a href="#coming-soon" class="footer-link">Support</a>
      </div>
    </div>
  </footer>

  <script async crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsudmF1bHRvZnNraWxscy5jb20k" src="https://clerk.vaultofskills.com/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
  <script src="auth-nav.js"></script>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const returnUrl = params.get('return_url') || '/';
      const loadingEl = document.getElementById('loading');
      const signupForm = document.getElementById('signup-form');
      const verifyForm = document.getElementById('verify-form');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const verifyCodeInput = document.getElementById('verify-code');
      const verifyEmailSpan = document.getElementById('verify-email');

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
      }
      function showSuccess(msg) {
        successMsg.textContent = msg;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
      }
      function clearMsgs() {
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
      }

      function showSignupForm() {
        loadingEl.style.display = 'none';
        signupForm.style.display = 'block';
        verifyForm.style.display = 'none';
      }

      function showVerifyForm(email) {
        loadingEl.style.display = 'none';
        signupForm.style.display = 'none';
        verifyForm.style.display = 'block';
        verifyEmailSpan.textContent = email;
        verifyCodeInput.focus();
      }

      // Step 1: Create account
      signupForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        clearMsgs();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
          const result = await window.Clerk.client.signUp.create({
            emailAddress: emailInput.value.trim(),
            password: passwordInput.value,
          });

          if (result.status === 'complete') {
            // No verification needed — activate session and redirect
            await window.Clerk.setActive({ session: result.createdSessionId });
            window.location.href = returnUrl;
            return;
          }

          if (result.status === 'missing_requirements') {
            // Email verification required
            await window.Clerk.client.signUp.prepareEmailAddressVerification({ strategy: 'email_code' });
            showVerifyForm(emailInput.value.trim());
            return;
          }

          showError('Unexpected response. Please try again.');
        } catch (err) {
          console.error('Signup error:', err);
          showError(err?.errors?.[0]?.message || err?.message || 'Failed to create account. Please try again.');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      });

      // Step 2: Verify email code
      verifyForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        clearMsgs();
        const btn = document.getElementById('verify-btn');
        btn.disabled = true;
        btn.textContent = 'Verifying...';

        try {
          const result = await window.Clerk.client.signUp.attemptEmailAddressVerification({
            code: verifyCodeInput.value.trim(),
          });

          if (result.status === 'complete') {
            await window.Clerk.setActive({ session: result.createdSessionId });
            window.location.href = returnUrl;
            return;
          }

          showError('Verification failed. Please check the code and try again.');
        } catch (err) {
          console.error('Verification error:', err);
          showError(err?.errors?.[0]?.message || err?.message || 'Invalid code. Please try again.');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Verify & Continue';
        }
      });

      // Wait for Clerk to be ready
      let attempts = 0;
      const timer = setInterval(function() {
        attempts++;
        if (window.Clerk && window.Clerk.loaded) {
          clearInterval(timer);
          showSignupForm();
          return;
        }
        if (attempts >= 150) {
          clearInterval(timer);
          loadingEl.style.display = 'none';
          showError('Authentication took too long to load. Please check your connection and refresh.');
        }
      }, 100);
    })();
  </script>

</body>
</html>
