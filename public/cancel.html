<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — SkillVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --bg-primary: #0b0c10;
      --bg-secondary: #15171e;
      --bg-card: #1a1c24;
      --text-primary: #f0f2f8;
      --text-secondary: #a4a8b8;
      --text-muted: #6b6f82;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --border: #2a2d3a;
      --amber: #f59e0b;
      --amber-bg: rgba(245,158,11,0.12);
      --radius-md: 12px;
      --radius-xl: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--amber-bg);
      color: var(--amber);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 32px; height: 32px; }
    h1 { font-family: var(--font-display); font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: 15px; font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-light); }
    .btn-secondary { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,158,11,0.25); }
    .btn-secondary:hover { background: rgba(245,158,11,0.18); }
    .buttons { display: flex; flex-direction: column; gap: 10px; }
    .skill-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: left;
    }
    .skill-box .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
    .skill-box .name { font-family: var(--font-display); font-size: 16px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </div>
    <h1>Payment Cancelled</h1>
    <p>No worries — your card wasn't charged. You can come back and complete your purchase anytime.</p>

    <div id="skill-info" class="skill-box" style="display:none;">
      <div class="label">Your Skill</div>
      <div class="name" id="skill-name">—</div>
    </div>

    <div class="buttons">
      <a href="/" class="btn btn-primary" id="back-btn">Back to Skills</a>
      <a href="/pricing.html" class="btn btn-secondary">View Pricing</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const skillId = params.get('skill_id');
    const redirectPath = params.get('redirect') || '/';
    const skillNames = {
      'analytics-feedback-loop': 'Analytics Feedback Loop',
      'video-cue': 'Video Cue',
      'blotato-social': 'Blotato Social',
      'nova-orchestrator': 'Nova Orchestrator',
      'course-architect': 'Course Architect',
      'slide-script-architect': 'Slide Script Architect',
      'video-stitcher': 'Video Stitcher',
      'landingpage': 'Landing Page Builder',
      'bridgepage': 'Bridge Page Builder',
      'optinpage': 'Opt-In Page Builder',
      'inbox-copywriter': 'Inbox Copywriter',
      'content-calendar': 'Content Calendar',
      'repurposing-engine': 'Repurposing Engine',
      'social-post-pipeline': 'Social Post Pipeline',
      'elevenlabs-voice': 'ElevenLabs Voice',
      'cloudinary': 'Cloudinary',
      'slide-renderer': 'Slide Renderer',
      'video-assembler': 'Video Assembler',
      'salespage': 'Sales Page Generator',
      'vsl': 'VSL Script Generator',
      'pagecode': 'Page Code Generator',
      'deployment-setup': 'Deployment Setup',
      'project-setup': 'Project Setup',
      'vercel-config': 'Vercel Config',
      'stripe-setup-siteforge': 'Stripe Setup',
    };

    if (skillId) {
      document.getElementById('skill-info').style.display = 'block';
      document.getElementById('skill-name').textContent = skillNames[skillId] || skillId;
      document.getElementById('back-btn').href = redirectPath;
      document.getElementById('back-btn').textContent = 'Back to Skill Page';
    }
  </script>
</body>
</html>
