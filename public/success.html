<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — SkillVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --bg-primary: #0b0c10;
      --bg-secondary: #15171e;
      --bg-card: #1a1c24;
      --text-primary: #f0f2f8;
      --text-secondary: #a4a8b8;
      --text-muted: #6b6f82;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --border: #2a2d3a;
      --green: #34d399;
      --green-bg: rgba(52,211,153,0.12);
      --amber: #f59e0b;
      --violet: #a78bfa;
      --violet-bg: rgba(167,139,250,0.12);
      --radius-md: 12px;
      --radius-xl: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px 36px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }
    .icon.success { background: var(--green-bg); }
    .icon.pro { background: var(--violet-bg); }
    .icon svg { width: 36px; height: 36px; }
    h1 { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    .subtitle { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 28px; }

    /* Skill download box */
    .dl-box {
      background: var(--bg-secondary);
      border: 1px solid rgba(52,211,153,0.25);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      margin-bottom: 24px;
      text-align: left;
      display: none;
    }
    .dl-box-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .dl-box-name { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }
    .dl-status {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: var(--green); font-weight: 600;
      margin-bottom: 16px;
    }
    .dl-status svg { flex-shrink: 0; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    .dl-status.done svg { animation: none; }
    .dl-status.done { color: var(--green); }

    .buttons { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 24px;
      border-radius: var(--radius-md);
      font-size: 15px; font-weight: 600;
      font-family: var(--font-body);
      text-decoration: none;
      border: 1px solid;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-download {
      background: var(--green-bg);
      color: var(--green);
      border-color: rgba(52,211,153,0.3);
    }
    .btn-download:hover { background: rgba(52,211,153,0.18); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-light); }
    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--bg-secondary); color: var(--text-primary); }

    /* Pro banner */
    .pro-perks {
      background: var(--bg-secondary);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 24px;
      text-align: left;
      display: none;
    }
    .pro-perks li {
      font-size: 14px; color: var(--text-secondary);
      list-style: none; padding: 5px 0;
      display: flex; align-items: center; gap: 8px;
    }
    .pro-perks li::before { content: '✦'; color: var(--violet); font-size: 11px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon success" id="icon">
      <!-- checkmark -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#34d399" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1 id="title">Payment Confirmed</h1>
    <p class="subtitle" id="subtitle">Your download is starting now.</p>

    <!-- Skill download section (shown for $9 skill purchases) -->
    <div class="dl-box" id="dl-box">
      <div class="dl-box-label">Your Skill</div>
      <div class="dl-box-name" id="skill-name">—</div>
      <div class="dl-status" id="dl-status">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" x2="12" y1="15" y2="3"/>
        </svg>
        <span id="dl-status-text">Downloading…</span>
      </div>
    </div>

    <!-- Pro perks (shown for Vault Pro subscription) -->
    <ul class="pro-perks" id="pro-perks">
      <li>Access to all 37+ skills — free, paid, and pro</li>
      <li>Every new skill added to the vault automatically</li>
      <li>Download anything, anytime from Settings</li>
    </ul>

    <div class="buttons" id="buttons">
      <!-- populated by JS -->
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId  = params.get('session_id');
    const skillId    = params.get('skill_id') || '';
    const redirectPath = params.get('redirect') || '/';

    // ── Skill name map ────────────────────────────────────────────────────────
    const SKILL_NAMES = {
      'analytics-feedback-loop': 'Analytics Feedback Loop',
      'article-cue': 'Article Cue',
      'video-cue': 'Video Cue',
      'repurposing-engine': 'Repurposing Engine',
      'content-calendar': 'Content Calendar',
      'blotato-social': 'Blotato Social',
      'social-post-pipeline': 'Social Post Pipeline',
      'telegram-bot': 'Telegram Bot',
      'lead-magnet-builder': 'Lead Magnet Builder',
      'nova-orchestrator': 'Nova Orchestrator',
      'trend-intelligence': 'Trend Intelligence',
      'course-video-pipeline': 'Course Video Pipeline',
      'course-architect': 'Course Architect',
      'slide-script-architect': 'Slide Script Architect',
      'slide-renderer': 'Slide Renderer',
      'elevenlabs-voice': 'ElevenLabs Voice',
      'cloudinary': 'Cloudinary',
      'video-assembler': 'Video Assembler',
      'video-stitcher': 'Video Stitcher',
      'google-drive-delivery': 'Google Drive Delivery',
      'masterwebsitebuilder': 'Master Website Builder',
      'landingpage': 'Landing Page Builder',
      'bridgepage': 'Bridge Page Builder',
      'salespage': 'Sales Page Generator',
      'vsl': 'VSL Script Generator',
      'herosection': 'Hero Section Generator',
      'optinpage': 'Opt-In Page Builder',
      'thankyoupage': 'Thank You Page Builder',
      'socialproof': 'Social Proof Formatter',
      'metacopy': 'Meta Copy Skill',
      'pagecode': 'Page Code Generator',
      'deployment-setup': 'Deployment Setup',
      'project-setup': 'Project Setup',
      'vercel-config': 'Vercel Config',
      'stripe-setup-siteforge': 'Stripe Setup',
      'inbox-copywriter': 'Inbox Copywriter',
      'master-copywriter': 'Master Copywriter',
    };

    function friendlyName(id) {
      return SKILL_NAMES[id] || id.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    const titleEl     = document.getElementById('title');
    const subtitleEl  = document.getElementById('subtitle');
    const iconEl      = document.getElementById('icon');
    const dlBox       = document.getElementById('dl-box');
    const skillNameEl = document.getElementById('skill-name');
    const dlStatus    = document.getElementById('dl-status');
    const dlStatusTxt = document.getElementById('dl-status-text');
    const proPerks    = document.getElementById('pro-perks');
    const buttonsEl   = document.getElementById('buttons');

    // ── SKILL PURCHASE ────────────────────────────────────────────────────────
    if (skillId) {
      titleEl.textContent   = 'Skill Unlocked!';
      subtitleEl.textContent = 'Your purchase is confirmed. Your download has started — check your downloads folder.';

      skillNameEl.textContent = friendlyName(skillId);
      dlBox.style.display = 'block';

      // ── Trigger download IMMEDIATELY (synchronous, before any async work) ──
      // This fires during page load — not inside a callback — so browsers allow it.
      (function triggerDownload() {
        const a = document.createElement('a');
        a.href = '/skills/' + skillId + '.zip';
        a.download = skillId + '.zip';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      })();

      // Update status to "done" after a moment
      setTimeout(function() {
        dlStatusTxt.textContent = 'Download started — check your downloads folder';
        dlStatus.classList.add('done');
      }, 1200);

      // Buttons
      buttonsEl.innerHTML = `
        <a href="/skills/${skillId}.zip" download="${skillId}.zip" class="btn btn-download">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" x2="12" y1="15" y2="3"/>
          </svg>
          Download Again
        </a>
        <a href="/" class="btn btn-ghost">Browse More Skills</a>
      `;

    // ── VAULT PRO SUBSCRIPTION ────────────────────────────────────────────────
    } else {
      iconEl.classList.remove('success');
      iconEl.classList.add('pro');
      iconEl.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#a78bfa" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/>
          <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
          <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
          <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
        </svg>`;
      titleEl.textContent   = 'Welcome to Vault Pro!';
      subtitleEl.textContent = 'You now have unlimited access to all skills — present and future.';
      proPerks.style.display = 'block';

      buttonsEl.innerHTML = `<a href="/" class="btn btn-primary">Browse All Skills</a>`;
    }

    // ── Background sync (doesn't block or affect UI) ──────────────────────────
    if (sessionId) {
      fetch('/api/sync-purchase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId }),
      }).catch(function(err) {
        console.warn('[success] Background sync failed (non-fatal):', err);
      });
    }
  </script>
</body>
</html>
