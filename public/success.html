<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — SkillVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --bg-primary: #0b0c10;
      --bg-secondary: #15171e;
      --bg-card: #1a1c24;
      --text-primary: #f0f2f8;
      --text-secondary: #a4a8b8;
      --text-muted: #6b6f82;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --border: #2a2d3a;
      --green: #34d399;
      --green-bg: rgba(52,211,153,0.12);
      --radius-md: 12px;
      --radius-xl: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px 36px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--green-bg);
      color: var(--green);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 32px; height: 32px; }
    h1 { font-family: var(--font-display); font-size: 26px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 28px; }
    .status { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--accent-light); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Payment Successful</h1>
    <p>Thank you for your purchase. Your access will be activated shortly.</p>
    <div class="status" id="sync-status">Activating your account...</div>
    <a href="/" class="btn">Back to Skills</a>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/module/index.js';

    const SUPABASE_URL = 'https://xeuydbzqwapwqxmzkgup.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_DAtZ1BPeDnAadseLI50S0w_1iflbK7M';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const statusEl = document.getElementById('sync-status');

    async function syncPurchase() {
      if (!sessionId) {
        statusEl.textContent = 'No session ID found.';
        return;
      }

      try {
        // Update the purchase status to completed
        const { error } = await supabase
          .from('purchases')
          .update({ status: 'completed', updated_at: new Date().toISOString() })
          .eq('stripe_session_id', sessionId);

        if (error) {
          console.error('Supabase sync error:', error);
          statusEl.textContent = 'Account updated.';
          return;
        }

        statusEl.textContent = "Account activated! You're all set.";
      } catch (err) {
        console.error('Sync failed:', err);
        statusEl.textContent = 'Account updated.';
      }
    }

    syncPurchase();
  </script>
</body>
</html>
