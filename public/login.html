<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SkillVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --bg-primary: #0b0c10;
      --bg-secondary: #15171e;
      --bg-card: #1a1c24;
      --text-primary: #f0f2f8;
      --text-secondary: #a4a8b8;
      --text-muted: #6b6f82;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-glow: rgba(99,102,241,0.22);
      --border: #2a2d3a;
      --rose: #f43f5e;
      --green: #34d399;
      --radius-md: 12px;
      --radius-xl: 20px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: var(--font-body); background: var(--bg-primary); color: var(--text-primary); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
    h1 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; }

    .nav { background: rgba(11,12,16,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1280px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10; text-decoration: none; }
    .logo-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 2px 8px var(--accent-glow); flex-shrink: 0; }
    .logo-text { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text-primary); margin-left: 10px; }

    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 24px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 40px 32px; width: 100%; max-width: 440px; text-align: center; display: none; }
    .card.active { display: block; }
    .card-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .card-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

    .form-group { text-align: left; margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); font-size: 14px; font-family: var(--font-body); outline: none; }
    .form-group input:focus { border-color: var(--accent); }

    .submit-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: all 0.2s; }
    .submit-btn:hover { background: var(--accent-light); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg { color: var(--rose); font-size: 14px; margin-top: 12px; display: none; }
    .success-msg { color: var(--green); font-size: 14px; margin-top: 12px; display: none; }
    .loading-wrap { display: none; flex-direction: column; align-items: center; gap: 14px; padding: 20px 0; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .signup-prompt { font-size: 14px; color: var(--text-secondary); margin-top: 16px; }
    .signup-prompt a { color: var(--accent); text-decoration: none; font-weight: 600; }

    .email-hint { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

    .footer { border-top: 1px solid var(--border); padding: 20px 24px; }
    .footer-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </div>
        <span class="logo-text">SkillVault</span>
      </a>
    </div>
  </nav>

  <main class="main">
    <!-- STEP 1: Email + Password -->
    <div class="card active" id="step1">
      <h1 class="card-title">Welcome Back</h1>
      <p class="card-sub">Sign in to your SkillVault account</p>

      <form id="signin-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Your password">
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
      </form>

      <div class="loading-wrap" id="loading">
        <div class="spinner"></div>
        <span style="color:var(--text-muted);font-size:14px;">Signing in...</span>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <p class="signup-prompt">Don't have an account? <a href="/signup.html">Sign up</a></p>
    </div>

    <!-- STEP 2: Verification Code -->
    <div class="card" id="step2">
      <h1 class="card-title">Check Your Email</h1>
      <p class="card-sub">A verification code has been sent to your email</p>
      <p class="email-hint" id="email-display"></p>

      <form id="verify-form" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label>Verification Code</label>
          <input type="text" id="code" required placeholder="123456" maxlength="6">
        </div>
        <button type="submit" class="submit-btn" id="verify-btn">Continue</button>
      </form>

      <div class="loading-wrap" id="verify-loading">
        <div class="spinner"></div>
        <span style="color:var(--text-muted);font-size:14px;">Verifying...</span>
      </div>

      <div class="error-msg" id="verify-error"></div>
      <div class="success-msg" id="verify-success">Code sent! Check your inbox.</div>

      <p class="signup-prompt"><a href="#" id="back-link">← Back to sign in</a></p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div style="font-size:13px;color:var(--text-muted)">SkillVault · AI-Powered Skills</div>
    </div>
  </footer>

  <script crossorigin="anonymous" data-clerk-publishable-key="pk_live_Y2xlcmsudmF1bHRvZnNraWxscy5jb20k" src="https://clerk.vaultofskills.com/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const returnUrl = params.get('return_url') || '/';

      // Step 1 elements
      const step1 = document.getElementById('step1');
      const signinForm = document.getElementById('signin-form');
      const submitBtn = document.getElementById('submit-btn');
      const loading = document.getElementById('loading');
      const errorMsg = document.getElementById('error-msg');

      // Step 2 elements
      const step2 = document.getElementById('step2');
      const verifyForm = document.getElementById('verify-form');
      const verifyBtn = document.getElementById('verify-btn');
      const verifyLoading = document.getElementById('verify-loading');
      const verifyError = document.getElementById('verify-error');
      const verifySuccess = document.getElementById('verify-success');
      const emailDisplay = document.getElementById('email-display');
      const backLink = document.getElementById('back-link');

      function showStep1Error(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
        loading.style.display = 'none';
        submitBtn.disabled = false;
      }

      function showStep2Error(msg) {
        verifyError.textContent = msg;
        verifyError.style.display = 'block';
        verifyLoading.style.display = 'none';
        verifyBtn.disabled = false;
      }

      function switchToStep2(email) {
        step1.classList.remove('active');
        step2.classList.add('active');
        emailDisplay.textContent = email;
        verifySuccess.style.display = 'block';
        document.getElementById('code').focus();
      }

      function switchToStep1() {
        step2.classList.remove('active');
        step1.classList.add('active');
        verifyError.style.display = 'none';
        verifySuccess.style.display = 'none';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }

      backLink.addEventListener('click', (e) => {
        e.preventDefault();
        switchToStep1();
      });

      // Step 1: Email + Password
      signinForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) {
          showStep1Error('Please enter both email and password');
          return;
        }

        // Show loading immediately so user knows something is happening
        submitBtn.disabled = true;
        loading.style.display = 'flex';
        errorMsg.style.display = 'none';

        // Wait up to 8s for Clerk script to appear on the page
        let scriptWait = 0;
        while (!window.Clerk && scriptWait < 8000) {
          await new Promise(r => setTimeout(r, 200));
          scriptWait += 200;
        }

        if (!window.Clerk) {
          showStep1Error('Authentication system not loaded. Please refresh the page.');
          return;
        }

        // Explicitly call Clerk.load() — don't just wait for the data-attribute auto-init
        if (!window.Clerk.loaded) {
          try {
            await window.Clerk.load({
              publishableKey: 'pk_live_Y2xlcmsudmF1bHRvZnNraWxscy5jb20k'
            });
          } catch (loadErr) {
            console.error('[Login] Clerk.load() failed:', loadErr);
            showStep1Error('Authentication system failed to start. Please refresh and try again.');
            return;
          }
        }
        errorMsg.style.display = 'none';

        try {
          console.log('[Login] Attempting sign-in...');
          const result = await window.Clerk.client.signIn.create({
            identifier: email,
            password: password
          });

          console.log('[Login] Sign-in result:', result.status);

          if (result.status === 'complete') {
            if (result.createdSessionId && window.Clerk.setActive) {
              await window.Clerk.setActive({ session: result.createdSessionId });
            }
            window.location.href = returnUrl;
          } else if (result.status === 'needs_second_factor') {
            // Switch to verification code view
            try {
              await result.prepareSecondFactor({ strategy: 'email_code' });
              window.currentSignIn = result;
              switchToStep2(email);
            } catch (err) {
              showStep1Error('Could not send verification code. Please try again.');
            }
          } else {
            showStep1Error('Sign-in requires additional verification: ' + result.status);
          }
        } catch (err) {
          console.error('[Login] Sign-in error:', err);
          showStep1Error(err.message || 'Sign in failed. Please check your credentials and try again.');
        } finally {
          submitBtn.disabled = false;
          loading.style.display = 'none';
        }
      });

      // Step 2: Verification Code
      verifyForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const code = document.getElementById('code').value;

        if (!code) {
          showStep2Error('Please enter the verification code');
          return;
        }

        if (!window.currentSignIn) {
          showStep2Error('Session expired. Please go back and sign in again.');
          return;
        }

        verifyBtn.disabled = true;
        verifyLoading.style.display = 'flex';
        verifyError.style.display = 'none';

        try {
          console.log('[Login] Attempting second factor...');
          const result = await window.currentSignIn.attemptSecondFactor({
            strategy: 'email_code',
            code: code
          });

          console.log('[Login] 2FA result:', result.status);
          
          if (result.status === 'complete') {
            if (result.createdSessionId && window.Clerk.setActive) {
              await window.Clerk.setActive({ session: result.createdSessionId });
            }
            window.location.href = returnUrl;
          } else {
            showStep2Error('Verification failed: ' + result.status);
          }
        } catch (err) {
          console.error('[Login] 2FA error:', err);
          showStep2Error(err.message || 'Verification failed. Please check the code and try again.');
        } finally {
          verifyBtn.disabled = false;
          verifyLoading.style.display = 'none';
        }
      });
    })();
  </script>
</body>
</html>
